<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNGCE Alumni Portal</title>
    </head>
<body>

    <header>
        <nav>
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'job_list' %}">Jobs</a>
            {% if request.user.is_authenticated %}
                {% if request.user.profile.is_alumni %}
                    <a href="{% url 'job_post' %}">Post a Job</a>
                {% endif %}
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
               
    <a href="{% url 'login' %}">Login</a>
    <a href="{% url 'register_student' %}">Register as Student</a>
    <a href="{% url 'register_alumni' %}">Register as Alumni</a>

            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
